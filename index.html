<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070a16" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- 폰트: <link>로 로드(빌드 안전 + preconnect로 더 빠름). index.css @import 금지 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" />
    <!-- Pretendard — OFL 한국어 폰트 (jsDelivr CDN, 저작권 없음) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

    <title>천문 · AI 명리학 운세 리포트</title>
    <meta name="description" content="태어난 순간의 하늘을 읽어, 오늘의 운세부터 평생 사주·궁합·타로까지. 가장 다정하고 아름다운 AI 운세 의식, 천문." />

    <!-- iOS 홈 화면(앱처럼) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="천문" />
    <!-- 모바일 확대 방지 & 안전 영역 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- 검색엔진 -->
    <meta name="keywords" content="천문, 사주, 운세, AI운세, 타로, 궁합, 명리학, 일일운세" />
    <meta name="robots" content="index, follow" />
    <!-- 색상 스키마 -->
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph (카카오톡·페이스북 공유 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="천문" />
    <meta property="og:title" content="천문 · AI 명리학 운세 리포트" />
    <meta property="og:description" content="태어난 순간의 하늘을 읽어 오늘의 운세부터 평생 사주까지. 가장 다정하고 아름다운 AI 운세 의식." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="천문 · AI 명리학 운세 리포트" />
    <meta name="twitter:description" content="태어난 순간의 하늘을 읽어 오늘의 운세부터 평생 사주까지." />
    <meta name="twitter:image" content="/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
